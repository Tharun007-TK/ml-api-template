name: Deploy Pipeline
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MODEL_PATH: classifier.pkl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run pytest
        run: pytest -q

      - name: Endpoint contract checks
        run: |
          python - <<'PY'
          import os
          os.environ.setdefault("MODEL_PATH", "classifier.pkl")
          from fastapi.testclient import TestClient
          from app import app
          client = TestClient(app)
          valid_payload = {
              "variance": 3.6216,
              "skewness": 8.6661,
              "kurtosis": -2.8073,
              "entropy": -0.44699,
          }
          ok_response = client.post("/predict", json=valid_payload)
          assert ok_response.status_code == 200
          missing_response = client.post("/predict", json={"variance": 1.0})
          assert missing_response.status_code == 422
          PY

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/banknote-auth-ml-api:latest
            ${{ secrets.DOCKER_USERNAME }}/banknote-auth-ml-api:${{ github.sha }}
